server:
  port: 8081

spring:
  config:
    import: optional:configserver:http://localhost:8085

  datasource:
    url: jdbc:mysql://localhost:3306/microservice
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  # profiles:
  #   active: dev

  application:
    name: USER-SERVICE

